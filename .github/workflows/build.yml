name: EAS Build

# Build workflow:
#   Feature branches → Dev Client (connects to Expo dev server for hot reload + native module testing)
#   Master merge     → Preview IPA (standalone, no dev server needed)
#   Version tags     → Production build (iOS + Android)
#   Manual dispatch  → Any profile/platform combination

on:
  push:
    branches: [master, main, 'feat/**']
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'development-device'
        type: choice
        options:
          - development-device
          - development
          - preview
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  # ── Feature branches → Dev Client (native modules + hot reload) ──
  build-dev-ios:
    name: Dev Client (iOS device)
    if: >
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/') &&
      github.ref != 'refs/heads/master' &&
      github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > firebase/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS dev client
        run: eas build --platform ios --profile development-device --non-interactive

  # ── Master push → Preview IPA (standalone, testable without dev server) ──
  build-preview-ios:
    name: Preview IPA (iOS)
    if: >
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/') &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > firebase/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS preview
        run: eas build --platform ios --profile preview --non-interactive

  # ── Version tag → Production build (iOS + Android) ──
  build-production:
    name: Production Build (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        platform: [ios, android]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > firebase/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build ${{ matrix.platform }}
        run: eas build --platform ${{ matrix.platform }} --profile production --non-interactive

  # ── Manual dispatch → any profile/platform ──
  build-manual:
    name: Manual Build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BUILD_PROFILE: ${{ inputs.profile }}
      BUILD_PLATFORM: ${{ inputs.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > firebase/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        if: env.BUILD_PLATFORM == 'ios' || env.BUILD_PLATFORM == 'all'
        run: eas build --platform ios --profile "$BUILD_PROFILE" --non-interactive

      - name: Build Android
        if: env.BUILD_PLATFORM == 'android' || env.BUILD_PLATFORM == 'all'
        run: eas build --platform android --profile "$BUILD_PROFILE" --non-interactive
