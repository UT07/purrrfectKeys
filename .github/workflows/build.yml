name: EAS Build

# Dual-build workflow:
#   Feature branches → Dev Client (connects to Expo dev server for hot reload testing)
#   Master merge     → Preview IPA (standalone, no dev server needed)
#   Version tags     → Production build
#   Manual dispatch  → Any profile/platform combination

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development-device
          - preview
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android

jobs:
  # ── Master push → Preview IPA (standalone, testable without dev server) ──
  build-preview-ios:
    name: Preview IPA (iOS)
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > firebase/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS preview
        run: eas build --platform ios --profile preview --non-interactive

  # ── Version tag → Production build (iOS + Android) ──
  build-production:
    name: Production Build (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        platform: [ios, android]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > firebase/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build ${{ matrix.platform }}
        run: eas build --platform ${{ matrix.platform }} --profile production --non-interactive

  # ── Manual dispatch → any profile/platform (dev client, preview, or production) ──
  build-manual:
    name: Manual Build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BUILD_PROFILE: ${{ inputs.profile }}
      BUILD_PLATFORM: ${{ inputs.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > firebase/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        run: eas build --platform "$BUILD_PLATFORM" --profile "$BUILD_PROFILE" --non-interactive
