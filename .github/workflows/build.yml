name: EAS Build

# Build workflow:
#   Feature branches → Auto-build Dev Client on push (hot reload + native module testing)
#   Master/main      → Manual-only builds via workflow_dispatch (preserves EAS quota)
#
#   For master builds: Actions tab → EAS Build → Run workflow → pick profile + platform

on:
  push:
    branches: ['feat/**']
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development-device
          - development
          - preview
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  # ── Feature branches → Auto Dev Client (like a dev server) ──
  build-dev:
    name: Dev Client (iOS)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > firebase/GoogleService-Info.plist
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS dev client
        run: eas build --platform ios --profile development-device --non-interactive

  # ── Manual dispatch → any profile/platform (for master/preview/production) ──
  build-manual:
    name: Build (${{ inputs.profile }} / ${{ inputs.platform }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BUILD_PROFILE: ${{ inputs.profile }}
      BUILD_PLATFORM: ${{ inputs.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config files
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > firebase/GoogleService-Info.plist
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        if: env.BUILD_PLATFORM == 'ios' || env.BUILD_PLATFORM == 'all'
        run: eas build --platform ios --profile "$BUILD_PROFILE" --non-interactive

      - name: Build Android
        if: env.BUILD_PLATFORM == 'android' || env.BUILD_PLATFORM == 'all'
        run: eas build --platform android --profile "$BUILD_PROFILE" --non-interactive
