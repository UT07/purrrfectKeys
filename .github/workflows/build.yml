# ──────────────────────────────────────────────────────────────
#  Build — Preview (Internal Testing)
# ──────────────────────────────────────────────────────────────
# Builds iOS + Android via EAS Build with the "preview" profile.
# Runs quality gate first, then triggers EAS builds.
#
# Triggers:
#   - Push to master (auto-build after quality gate)
#   - Manual dispatch (choose platform)
#
# Required GitHub Secrets:
#   EXPO_TOKEN                    - Expo account token
#   GOOGLE_SERVICE_INFO_PLIST     - base64 iOS Firebase config
#   GOOGLE_SERVICES_JSON          - base64 Android Firebase config
#
# EAS Secrets (set via `eas secret:push`):
#   EXPO_PUBLIC_FIREBASE_API_KEY, EXPO_PUBLIC_FIREBASE_PROJECT_ID, etc.
# ──────────────────────────────────────────────────────────────
name: Build Preview

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - ios
          - android
          - all

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Quality Gate ──────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test -- --ci --maxWorkers=2

  # ── EAS Builds ───────────────────────────────
  build-ios:
    name: iOS Preview Build
    needs: [typecheck, lint, test]
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'ios' ||
      inputs.platform == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase configs
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p firebase
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > firebase/GoogleService-Info.plist
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger iOS build
        run: |
          eas build --platform ios --profile preview --non-interactive --no-wait
          echo "### iOS Preview Build Triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "Profile: \`preview\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Track progress at [expo.dev](https://expo.dev/accounts/ut254/projects/purrrfect-keys/builds)" >> "$GITHUB_STEP_SUMMARY"

  build-android:
    name: Android Preview Build
    needs: [typecheck, lint, test]
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'android' ||
      inputs.platform == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase configs
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p firebase
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > firebase/GoogleService-Info.plist
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > firebase/google-services.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger Android build
        run: |
          eas build --platform android --profile preview --non-interactive --no-wait
          echo "### Android Preview Build Triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "Profile: \`preview\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Track progress at [expo.dev](https://expo.dev/accounts/ut254/projects/purrrfect-keys/builds)" >> "$GITHUB_STEP_SUMMARY"
