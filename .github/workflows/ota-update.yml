# ──────────────────────────────────────────────────────────────
#  OTA Update — Instant JS Updates + Rollback
# ──────────────────────────────────────────────────────────────
# Publish over-the-air updates via EAS Update for JS-only changes.
# Users get updates on next app launch without going through stores.
#
# Publish: runs quality gate, then publishes from current HEAD.
# Rollback: checks out a specified commit and publishes from it.
#
# Note: OTA updates only work for JS/asset changes. Native code
# changes (new native modules, SDK version bumps) require a
# full rebuild via the Build or Release workflows.
#
# Required GitHub Secrets:
#   EXPO_TOKEN - Expo account token
# ──────────────────────────────────────────────────────────────
name: OTA Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      action:
        description: 'Action to perform'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - rollback
      message:
        description: 'Update message (for publish)'
        required: false
        type: string
      rollback_ref:
        description: 'Git ref to rollback to (commit SHA or tag, for rollback only)'
        required: false
        type: string

concurrency:
  group: ota-update
  cancel-in-progress: false

jobs:
  # ── Publish New Update ────────────────────────
  quality-gate:
    name: Quality Gate
    if: inputs.action == 'publish'
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish OTA Update
    needs: quality-gate
    if: inputs.action == 'publish'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        env:
          CHANNEL: ${{ inputs.channel }}
          UPDATE_MESSAGE: ${{ inputs.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          MSG="${UPDATE_MESSAGE:-OTA update from $COMMIT_SHA}"
          eas update --channel "$CHANNEL" --message "$MSG" --non-interactive

      - name: Summary
        env:
          CHANNEL: ${{ inputs.channel }}
          UPDATE_MESSAGE: ${{ inputs.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "### OTA Update Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Channel | \`$CHANNEL\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`$COMMIT_SHA\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Message | ${UPDATE_MESSAGE:-auto-generated} |" >> "$GITHUB_STEP_SUMMARY"

  # ── Rollback to Previous Version ──────────────
  rollback:
    name: Rollback OTA Update
    if: inputs.action == 'rollback'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate rollback ref
        env:
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
        run: |
          if [ -z "$ROLLBACK_REF" ]; then
            echo "::error::rollback_ref is required for rollback action"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.rollback_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish rollback update
        env:
          CHANNEL: ${{ inputs.channel }}
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
        run: |
          eas update \
            --channel "$CHANNEL" \
            --message "Rollback to $ROLLBACK_REF" \
            --non-interactive

      - name: Summary
        env:
          CHANNEL: ${{ inputs.channel }}
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
        run: |
          echo "### OTA Rollback Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Channel | \`$CHANNEL\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rolled back to | \`$ROLLBACK_REF\` |" >> "$GITHUB_STEP_SUMMARY"
